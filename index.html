<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distill — every idea, a fraction of the pages</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23B45309'/%3E%3Cpath d='M50 16 84 50 50 84 16 50Z' fill='%23FDF6EC'/%3E%3C/svg%3E"
    />
    <script>
      try {
        var p = JSON.parse(localStorage.getItem('distill.prefs.v1') || '{}')
        var dark =
          p.appTheme === 'dark' ||
          (!p.appTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
      } catch (e) {
        document.documentElement.dataset.theme = 'light'
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
